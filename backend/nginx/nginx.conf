# nginx/nginx.conf
# Nginx reverse proxy configuration for AI Code Reviewer.
#
# Nginx receives all incoming requests and forwards them to the FastAPI app.
# Benefits: connection pooling, request buffering, timeout handling,
# gzip compression, security headers.

worker_processes auto;

events {
    # Max simultaneous connections per worker
    worker_connections 1024;
}

http {
    # ── Logging ──────────────────────────────────────────────
    log_format main '$remote_addr - $remote_user [$time_local] '
                    '"$request" $status $body_bytes_sent '
                    '"$http_referer" "$http_user_agent"';

    access_log /var/log/nginx/access.log main;
    error_log  /var/log/nginx/error.log warn;

    # ── Performance ───────────────────────────────────────────
    sendfile        on;
    tcp_nopush      on;
    tcp_nodelay     on;
    keepalive_timeout 65;

    # ── Gzip Compression ─────────────────────────────────────
    gzip on;
    gzip_types
        text/plain
        text/css
        application/json
        application/javascript;
    gzip_min_length 1000;

    # ── Rate Limiting ─────────────────────────────────────────
    # Limit each IP to 10 requests per second
    limit_req_zone $binary_remote_addr zone=api_limit:10m rate=10r/s;

    # ── Upstream — FastAPI App ────────────────────────────────
    upstream fastapi_app {
        # "app" is the Docker Compose service name
        server app:8000;

        # Keep connections alive to the app
        keepalive 32;
    }

    # ── Server Block ──────────────────────────────────────────
    server {
        listen 80;
        server_name localhost;

        # Max upload size (must match our 5MB app limit)
        client_max_body_size 10M;

        # Timeouts — important for long AI review requests (up to 2 min)
        proxy_connect_timeout   10s;
        proxy_send_timeout      180s;   # 3 minutes for AI processing
        proxy_read_timeout      180s;

        # ── Security Headers ──────────────────────────────────
        add_header X-Frame-Options         "SAMEORIGIN"   always;
        add_header X-Content-Type-Options  "nosniff"      always;
        add_header X-XSS-Protection        "1; mode=block" always;
        add_header Referrer-Policy         "strict-origin-when-cross-origin" always;

        # ── API Routes ────────────────────────────────────────
        location / {
            # Apply rate limiting
            limit_req zone=api_limit burst=20 nodelay;

            # Forward to FastAPI
            proxy_pass http://fastapi_app;

            # Required proxy headers
            proxy_set_header Host              $host;
            proxy_set_header X-Real-IP         $remote_addr;
            proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;

            # Disable buffering for streaming responses
            proxy_buffering    off;
            proxy_cache        off;

            # HTTP/1.1 for keepalive support
            proxy_http_version 1.1;
            proxy_set_header Connection "";
        }

        # ── Health Check (bypass rate limiting) ──────────────
        location /health {
            proxy_pass http://fastapi_app/health;
            proxy_set_header Host $host;
            access_log off;   # Don't clutter logs with health checks
        }

        # ── Error Pages ───────────────────────────────────────
        error_page 502 503 504 /50x.html;
        location = /50x.html {
            return 503 '{"error": "Service temporarily unavailable"}';
            add_header Content-Type application/json;
        }
    }
}