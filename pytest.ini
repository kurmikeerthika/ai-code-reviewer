# pytest.ini
# Global pytest configuration.

[pytest]
# Test discovery — look in the tests/ folder
testpaths = tests

# Async mode — all async tests use asyncio automatically
asyncio_mode = auto

# Output format
addopts =
    -v
    --tb=short
    --strict-markers
    --cov=app
    --cov-report=term-missing
    --cov-report=html:htmlcov
    --cov-fail-under=60

# Custom markers — used to tag tests
markers =
    unit: Unit tests (no external services)
    integration: Integration tests (uses TestClient)
    e2e: End-to-end tests (requires real API keys)
    slow: Tests that take more than 5 seconds